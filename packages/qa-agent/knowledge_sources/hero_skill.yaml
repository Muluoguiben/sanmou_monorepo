- id: mech-bond-faction
  domain: hero
  entry_kind: generic_rule
  topic: 阵营加成
  aliases:
  - 阵营
  - 同阵营加成
  - 同势力
  facts:
  - 同一国家 3 人上阵时，三人全部属性额外 +10%。
  - 2 人同国 + 1 人他国时，三人全部属性额外 +5%（非 0）。
  - 国家队（刘备/曹操/孙权所在国家队伍）额外享 +5% 全属性加成，但仅问鼎赛季生效，S1–S3 不生效。
  - 阵营/国家加成与缘分加成独立，可叠加。
  - 缘分加成仅对缘分内武将生效；队伍中未进入该缘分的武将吃不到该缘分效果。
  constraints: []
