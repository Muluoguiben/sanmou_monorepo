- id: hero-schema
  domain: hero
  topic: 武将静态资料字段
  aliases: [武将资料字段, 武将 schema, 武将录入字段, 批量录入武将, 武将字段]
  facts:
    - 批量录入武将资料时，至少应包含姓名、别名、阵营、稀有度、兵种标签和定位标签。
    - 如果掌握更细资料，建议继续补充基础属性、成长属性、代表战法和备注。
  constraints:
    - 属性数值应与当前版本数据源保持一致，缺失字段可以留空，但字段名应保持稳定。
