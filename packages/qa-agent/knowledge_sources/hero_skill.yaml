  domain: hero
  entry_kind: generic_rule
  topic: 部队上阵
  aliases:
  - 队伍结构
  - 上阵
  - 武将位置
  facts:
  - 每支部队上阵 3 名武将，三个位置平等，不区分主将/副将。
  - 每个武将的战法位数量相同：各自带 1 个自身战法；武将 10 级解锁第 2 个战法位（携带位）；武将 20 级解锁第 3 个战法位（携带位）。
  - 故每位武将最多可带 1 自带 + 2 携带 = 3 个战法。
