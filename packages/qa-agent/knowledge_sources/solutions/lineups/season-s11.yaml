- id: kdocs-lineup-s11_四海归心-lv7
  domain: solution
  entry_kind: lineup_solution
  topic: 四海归心 7级地开荒阵
  aliases:
  - 四海归心7级地
  - S117级地
  facts:
  - 最优队伍：左慈+田丰+张宁（左田宁）/ 董卓+祝融夫人+孟获。
  - 推荐等级：满红21/20、中高红22/21、低红白板23/22。
  - 开荒细节：左田宁：先开内城，左慈金城换知人，田丰料事换束手；后开外城，田丰束手换回料事。
  - 7级地守军常见组合 - 首开：邓艾、郭图、陈武；法正、曹真、潘璋
  - 7级地守军常见组合 - 简单：程普、丁奉、蒋钦（程普难很多）；于禁、张梁、董袭；大乔、小乔、孙尚香
  - 7级地守军常见组合 - 中等：张宝、程昱、丁奉；徐晃、邹氏、钟繇
  - 7级地守军常见组合 - 困难：甘宁、张郃、黄月英（左田宁难打）
  constraints:
  - 仅适用于 S11 四海归心 开荒场景。
