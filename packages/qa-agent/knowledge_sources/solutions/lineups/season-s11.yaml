- id: kdocs-lineup-s11_四海归心-lv8
  domain: solution
  entry_kind: lineup_solution
  topic: 四海归心 8级地开荒阵
  aliases:
  - 四海归心8级地
  - S118级地
  facts:
  - 最优队伍：左慈+田丰+张宁（左田宁）。
  - 推荐等级：满红26、中高红27、低红白板29。
  - 开荒细节：满红可以考虑无兵营开八；开八酌情考虑料事换屈人。蛮族版本最优队伍为董卓+祝融夫人+孟获（满红25/26/28），蛮族优先打内城黄忠、张飞，避开斩将夺旗。
  - 8级地守军常见组合 - 首开：张飞、许褚、文聘；张郃、程普、于禁
  - 8级地守军常见组合 - 简单：马云禄、黄盖、甄洛；张梁、张宝、卢植
  - 8级地守军常见组合 - 中等：黄忠、庞德、孔融；许褚、吕蒙、小乔；荀彧、法正、曹真
  - 8级地守军常见组合 - 困难：曹仁、孙坚、孙尚香
  constraints:
  - 仅适用于 S11 四海归心 开荒场景。
