- id: kdocs-lineup-s11_四海归心-lv11
  domain: solution
  entry_kind: lineup_solution
  topic: 四海归心 11级地开荒阵
  aliases:
  - 四海归心11级地
  - S1111级地
  facts:
  - 最优队伍：践墨随敌薪火南蛮 / 空城薪火南蛮。
  - 推荐等级：满红35、中红36、低红38。
  - 开荒细节：11 级存在两种选择：践墨随敌版与空城版，按阵容偏好挑选。
  - 11级地守军常见组合 - 首开：邓艾、孙尚香、甘宁；吕蒙、徐庶、黄盖
  - 11级地守军常见组合 - 简单：貂蝉、徐晃、关平；荀彧、大乔、张宝
  - 11级地守军常见组合 - 中等：袁绍、邓艾、许褚；徐晃、关羽、貂蝉
  - 11级地守军常见组合 - 困难：黄月英、典韦、马超；田丰、大乔、孙尚香（张宁更容易 / 姜维更怕）
  constraints:
