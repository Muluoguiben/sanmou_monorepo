- id: kdocs-lineup-s11_四海归心-lv9
  domain: solution
  entry_kind: lineup_solution
  topic: 四海归心 9级地开荒阵
  aliases:
  - 四海归心9级地
  - S119级地
  facts:
  - 最优队伍：蛮猪猪 / 左田宁（第一天）/ 刘诸姜（雁形阵）。
  - 推荐等级：满红32、中高红33、低红白板35。
  - 开荒细节：左田宁打张飞必带料事；打孙坚左慈金城换御敌临前；打甘宁、黄忠 田丰料事换御敌临前。
  - 9级地守军常见组合 - 首开：张飞、孙尚香、蔡文姬
  - 9级地守军常见组合 - 简单：甘宁、大乔、华雄
  - 9级地守军常见组合 - 中等：吕蒙、程昱、小乔；孙坚、邓艾、于禁（带挫锐）；黄忠、关平、黄月英
  - 9级地守军常见组合 - 困难：黄忠、关平、黄月英；貂蝉、徐晃、甄洛；吕蒙、程昱、小乔
  constraints:
  - 仅适用于 S11 四海归心 开荒场景。
