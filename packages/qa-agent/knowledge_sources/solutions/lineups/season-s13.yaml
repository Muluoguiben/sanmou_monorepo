- id: video-lineup-bv18hc6z7epp-s13-diaochan-zhangning-tianfeng-kaigang
  domain: solution
  entry_kind: lineup_solution
  topic: S13 貂蝉张宁田丰开荒过渡队
  aliases:
  - 貂蝉张宁田丰
  - 张宁过渡队
  facts:
  - 20级时，视频明确提到与张宁进行置换。
  - 同段提到田丰全先攻，说明田丰属于该阶段上阵武将。
  - 后续紧接着说明要检查张宁是否为队内统帅最高。
  - 视频证据摘要：B站 AI 中文字幕切片。
  constraints:
  - 该候选主要适用于20级左右的开荒过渡阶段。
  - 转队前后存在置换操作，说明不是全程固定阵容。
  - 战法内容只有“如上”提示，缺少可直接验证的具体技能名。
  source_type: manual_rule
  source_ref: BILIBILI:BV18hc6z7Epp#141-168
