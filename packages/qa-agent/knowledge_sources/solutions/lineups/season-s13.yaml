- id: kdocs-lineup-s13_兴汉讨逆-lv5
  domain: solution
  entry_kind: lineup_solution
  topic: 兴汉讨逆 5级地开荒阵
  aliases:
  - 兴汉讨逆5级地
  - S135级地
  facts:
  - 最优队伍：董卓+孟获+祝融夫人（横征+金城+胜敌）。
  - 推荐等级：满红8、中高红10、低红白板11。
  - 开荒细节：优先打内城，简单很多。
  - 5级地守军常见组合 - 首开：文聘、董袭、刘烨；皇甫嵩、丁奉、简雍
  - 5级地守军常见组合 - 简单：马良、韩当、钟繇；孔融、张曼成、郭淮
  - 5级地守军常见组合 - 中等：于禁、丁奉、沙摩柯；小乔、陈武、糜竺；邹氏、臧霸、刘表；邓艾、简雍、文聘
  - 5级地守军常见组合 - 困难：黄盖、曹真、张曼成；周仓、杨修、皇甫嵩；徐晃、丁奉、陈琳；张梁、张曼成、王朗
  constraints:
  - 仅适用于 S13 兴汉讨逆 开荒场景。
