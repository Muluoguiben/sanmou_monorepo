- id: kdocs-lineup-s13_兴汉讨逆-lv7
  domain: solution
  entry_kind: lineup_solution
  topic: 兴汉讨逆 7级地开荒阵
  aliases:
  - 兴汉讨逆7级地
  - S137级地
  facts:
  - 最优队伍：左田宁（挑邓艾）/ 董卓+祝融夫人+孟获（外城更优）。
  - 推荐等级：满红21/20、中高红22/21、低红白板23/22。
  - 开荒细节：南蛮内城避开程普，外城避开法师；左田宁田丰内城带束手、外城带料事；左慈内城带知人、外城带金城；或外城换南蛮更稳。
  - 7级地守军常见组合 - 首开：邓艾、郭图、陈武；法正、曹真、潘璋
  - 7级地守军常见组合 - 简单：于禁、张梁、董袭；甘宁、张郃、黄月英
  - 7级地守军常见组合 - 中等：徐晃、邹氏、钟繇；程普、丁奉、蒋钦；大乔、小乔、孙尚香
  - 7级地守军常见组合 - 困难：张宝、程昱、丁奉
  constraints:
  - 仅适用于 S13 兴汉讨逆 开荒场景。
