  topic: 陈仓之围 七级地开荒阵
  aliases:
  - 陈仓之围7级地
  - S14七级地
  facts:
  - 最优队伍：左田宁（左慈+田丰+张宁）或南蛮（孟获+祝融夫人+第三人），外城优先左田宁。
  - 推荐等级：满红20级，中高红22/21级，低红白板23/22级。
  - 开荒细节：南蛮内城避开程普，外城避开法师；左田宁内城建议田丰带束手无策，外城带其他控制。
  - 七级地守军常见组合 - 首开：邓艾/郭图/陈武，或 法正/曹真/潘璋。
  - 七级地守军常见组合 - 简单：于禁/张梁/董袭，或 甘宁/张郃/黄月英。
  - 七级地守军常见组合 - 中等：徐晃/邹氏/钟繇，或 程普/丁奉/蒋钦，或 大乔/小乔/孙尚香。
  - 七级地守军常见组合 - 困难：张宝/程昱/丁奉。
  constraints:
  - 仅适用于 S14 陈仓之围开荒场景。
