  topic: 陈仓之围 五级地开荒阵
  aliases:
  - 陈仓之围5级地
  - S14五级地
  facts:
  - 最优队伍为貂蝉+孟获+祝融夫人，带战法折冲+金城+胜敌。
  - 推荐等级：满红8级，有红度10级，纯白板11级。
  - 开荒细节：优先打内城，简单很多。
  - 五级地守军常见组合 - 首开：文聘/董袭/刘烨 或 皇甫嵩/丁奉/简雍。
  - 五级地守军常见组合 - 简单：马良/韩当/钟繇 或 孔融/张曼成/郭淮。
  - 五级地守军常见组合 - 中等：于禁/丁奉/沙摩柯，或 小乔/陈武/糜竺，或 邹氏/臧霸/刘表，或 邓艾/简雍/文聘。
  - 五级地守军常见组合 - 困难：黄盖/曹真/张曼成，或 周仓/杨修/皇甫嵩，或 徐晃/丁奉/陈琳，或 张梁/张曼成/王朗。
  constraints:
  - 仅适用于 S14 陈仓之围赛季开荒场景。
  - 等级门槛按红度分档，低于门槛不建议强开。
  source_type: manual_rule
