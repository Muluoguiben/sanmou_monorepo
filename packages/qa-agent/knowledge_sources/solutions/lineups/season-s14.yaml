  topic: 陈仓之围 九级地开荒阵
  aliases:
  - 陈仓之围9级地
  - S14九级地
  facts:
  - 最优队伍：南蛮或蛮猪猪（雁形阵蛮族开荒队）。
  - 推荐等级：满红30级，中高红32级，低红白板34级。
  - 开荒细节：董蛮打孙坚建议携带挫锐，董蛮打甘宁建议携带践墨随敌；貂蛮打徐晃建议携带披坚执锐；两者尽量避开有"斩将夺旗"的守军。
  - 九级地守军常见组合 - 首开：张飞/孙尚香/蔡文姬。
  - 九级地守军常见组合 - 简单：貂蝉/徐晃/甄洛。
  - 九级地守军常见组合 - 中等：孙坚/邓艾/于禁（带挫锐），或 黄忠/关平/黄月英，或 甘宁/大乔/华雄。
  - 九级地守军常见组合 - 困难：吕蒙/程昱/小乔。
  constraints:
  - 仅适用于 S14 陈仓之围开荒场景。
  - 解锁雁形阵后才可组成"蛮猪猪"队。
