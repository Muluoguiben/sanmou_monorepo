- id: mech-land-exp-decay
  domain: combat
  entry_kind: generic_rule
  topic: 打地经验衰减
  aliases:
  - 经验衰减
  - 打地经验
  - 越级打地
  - 降级打地
  facts:
  - 判定依据为队伍中最低等级武将 vs 土地推荐等级。
  - 等级远低于推荐等级：获得 70% 经验，消耗 20 体力。
  - 等级与推荐等级相当：获得 100% 经验，消耗 20 体力。
  - 等级远胜于推荐等级：获得 80% 经验，消耗 10 体力。
  - 等级相差巨大（碾压）：获得 0 经验，消耗 0 体力。
  constraints:
  - 高级队打低级地无收益也不扣体力，用于清地刷资源。
  - 降级打地可节省体力但牺牲 20% 经验。
