- id: combat-battle-loss
  domain: combat
  topic: 战损
  aliases:
  - 兵损
  - 战斗损失
  facts:
  - 战损是评估打地和持续推进能力的关键成本之一。
  - 如果战损过高，往往会拖慢征兵、体力利用和后续连续作战节奏。
  constraints:
  - 可接受战损阈值应结合当前阶段、资源和目标收益综合判断。
