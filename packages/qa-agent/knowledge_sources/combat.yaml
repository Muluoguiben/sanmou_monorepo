- id: combat-land
  domain: combat
  topic: 攻占地块
  aliases:
  - 打地
  - 攻地
  - 攻占土地
  facts:
  - 攻占地块前需要确认目标可达、队伍可出征，并评估战损是否可接受。
  - 打地收益不只看资源产出，还要看章节推进、体力消耗和节奏连续性。
  constraints:
  - 高等级地块和远距离目标通常意味着更高风险与时间成本。
