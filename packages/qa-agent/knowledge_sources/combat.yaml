- id: mech-land-difficulty-factors
  domain: combat
  entry_kind: generic_rule
  topic: 打地难度判断
  aliases:
  - 打地关键
  - 打地兵力够不够
  - 能不能打
  facts:
  - 打地能否通过主要看武将等级、武将红度（稀有度/进阶）、品度（品阶）。
  - 兵力不是决定性因素，够用即可。
  - 武将等级决定面板属性上限；红度/品度决定战法强度与面板加成。
  constraints:
  - 不要无脑堆兵打越级地——武将等级差距、战法等级不足时兵力多也打不穿。
