- id: kdocs-yanwu-logic
  domain: combat
  entry_kind: generic_rule
  topic: S1 演武选卡与配队逻辑（小仔哥 19 条）
  aliases:
  - 演武逻辑
  - 演武选卡
  - 演武配队
  facts:
  - 逻辑一 - 演武没有金书以及科技。
  - 逻辑二 - 演武相比实际战场，所有人输出强度下调约 20%，坦度上升约 20%。
  - 逻辑三 - 决定演武强度的，是武将本身的技能倍率与属性面板。
  - 逻辑四 - 演武内构筑同阵营及同兵种阵容必要性上升。
  - 逻辑五 - 演武中对属性造成影响的手段收益上升（提升自身属性或降低对方属性）。
  - 逻辑六 - 杠杆类武将在演武中优先级降低（例如黄盖、甄洛）。
  - 逻辑七 - S1 赛季减伤战法极为稀缺：避其锐气、铸甲销戈、横征暴敛（需求负面）。
  - 逻辑八 - 有能力站在前排的武将选取优先级大幅上升。
  - 逻辑九 - 演武中阵容是否合格的决定性因素，是队伍整体输出在大部分情况下能否打出超过 3 万兵力伤害。
  - 逻辑十 - 一只队伍输出合格后，队伍稳定性的优先级大幅上升，越稳定越容易晋级。
  - 逻辑十一 - 治疗角色与治疗技能的优先级大幅上升（有概率超出对方输出上限）。
  - 逻辑十二 - 指挥武将优先级上升；不是输出定位但有输出能力的武将优先级上升。
  - 逻辑十三 - 演武中总会选到一些完全无用的卡。
  - 逻辑十四 - 选卡基础规则：先一票否决拥有完全无用战法或武将的那一组，再在稍好的两组中挑选。
  - 逻辑十五 - 对于体系需求越大的武将越不应该选取。
  - 逻辑十六 - 反击、追击体系在演武中优先级极低。
  - 逻辑十七 - 并不是每次演武的目标都是冠军；先根据初始 4 武将 + 第一轮可选 3 组判断本周是冲出洲还是保 400。
  - 逻辑十八 - 边选边配，按需选择。
  - 逻辑十九 - 卡好补体系，卡差补核心。
  - T1 双减体系注：任何兵刃都是其好搭档，几乎必胜组合。
  - T1.5 袁董体系注：最佳第三人是貂蝉，庞德也行，别的也没问题，几乎必胜。
  - 其他：周瑜体系第三人最优是周瑜；诸葛亮站前排搭任意辅助，没有诸葛可以换赵云等高频输出。
  constraints:
  - 仅适用于 S1 赛季演武玩法（无金书无科技）。
