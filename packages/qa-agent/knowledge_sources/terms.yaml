- id: term-neicheng-land
  domain: term
  entry_kind: generic_rule
  topic: 内城土地
  aliases:
  - 内城地
  - 军垦地
  - 内城田
  facts:
  - 内城土地等级范围 2-12 级（外城土地仅到 8 级）。
  - 内城 8 级地难度低于外城 8 级地，"无兵营开八"的目标就是屯内城 8 级军垦。
  constraints:
  - 等级解锁取决于章节进度。
  source_type: manual_rule
  source_ref: user_clarification:2026-04-16
  updated_at: '2026-04-16'
  confidence: 0.9
  related_topics:
  - 开荒
  - 军垦
  - 无兵营开八
