- id: term-taozei
  domain: term
  entry_kind: generic_rule
  topic: 讨贼
  aliases:
  - 讨贼活动
  - 贼寇讨伐
  facts:
  - 讨贼是同盟独立玩法，与军演、主线经验是三套独立来源。
  - 讨贼单次经验 = 贼寇等级 × 2000（8 级贼寇 = 16000 经验）。
  - 3 兵讨贼技巧：二/三队不带兵 5 级蹭盟友讨贼车队，吃讨贼 + 军演双份经验即可快速飞到 10 级。
  constraints:
  - 不带兵蹭车需先跟队长沟通且有把握打赢。
  source_type: manual_rule
  source_ref: user_clarification:2026-04-16
  updated_at: '2026-04-16'
  confidence: 0.9
  related_topics:
  - 讨贼
  - 军演
  - 3兵讨贼
