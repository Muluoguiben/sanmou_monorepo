- id: term-opening
  domain: term
  topic: 开荒
  aliases:
  - 前期开荒
  - 开局发育
  facts:
  - 开荒通常指服务器早期围绕资源、章节、地块和队伍成长展开的高节奏发展阶段。
  - 开荒期的核心目标通常是用有限资源维持连续收益增长和关键进度推进。
  constraints:
  - 不同玩家目标下，开荒节奏重点会有所不同。
  source_type: manual_rule
  source_ref: KB-RULE-TERM-001
  updated_at: 2026-03-29
