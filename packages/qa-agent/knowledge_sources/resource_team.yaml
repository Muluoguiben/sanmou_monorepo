  - 盾克弓
  - 弓克枪
  - 枪克骑
  - 骑克盾
  facts:
  - 4 主战兵种：盾兵、骑兵、弓兵、枪兵。
  - 克制链：盾克弓 → 弓克枪 → 枪克骑 → 骑克盾。
  - 克制方对被克制兵种造成的伤害 +15%。
  constraints:
  - 器械（冲车/投石车/拒马/箭塔）属战争器械系统，不参与 4 兵种克制链。
