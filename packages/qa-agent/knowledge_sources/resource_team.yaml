- id: kdocs-walkthrough-s1
  domain: team
  entry_kind: generic_rule
  topic: S1 赛季开荒全流程（小仔哥版）
  aliases:
  - S1开荒流程
  - S1全流程
  - S1开荒指南
  facts:
  - 准备工作 - 职业优先选青囊或司仓，否则可能缺"药"或"军垦"。
  - 准备工作 - 一赛季前四个小时资源正常恢复，二赛季以后资源和体力都不回复。
  - 准备工作 - 过任务会给鸡腿（60 体力/个），只有 31 级以前的角色可以使用鸡腿。
  - 准备工作 - 所有建筑升级与解锁全部跟着任务走，不要升级任务要求以外的建筑。
  - 准备工作 - 日常商店务必买完所有铜币及预备兵；拍卖（二四六）可买"书简箱"与"天赋经验箱"。
  - 第一步 - 跟新手教程走，任务做到第四章时将初始阵容下阵，换成主力开荒队（5 级、满体力、铜币全部升满战法）。
  - 第二步 - 上阵主力队打 5 块三级地到 9 级；用卢植带两个输出武将（置换，最好上张郃、徐庶）打 1 块四级地到 10 级，解锁第一个战法。
  - 第三步 - 13 级开五常规；卢植+蔡文姬+张郃（避其锐气+铸甲销戈/奇门+水淹七军/屈人/谈心），或 袁绍+董卓+蔡文姬（避其+锐不+指点），有概率 11
    级甚至 10 级开五。兵买满，粮食和金币都买铜币。
  - 第四步 - 扫五到 20 级，携带第二个战法；去征战-军演打到极限，升六级君王殿解锁兵营后开内城六级地（木铁石各一块用于囤田，木铁一次、石头三次）。
  - 第五步 - 有兵营后按 7-9 级土地难度表推进，不越级打地。
  - 第六步 - 开服四小时解锁讨伐贼寇玩法；第一天一般只打六级贼寇；讨贼资源优先升兵营和过第十章任务；第十章切记最后升"民居"与"磨坊"。
  - 第七步 - 开荒期稳扎稳打，兵力不足时让一队扫低级地升级（25 级打六、30 级打七，只消耗 10 体力）；每天贼寇前两次正常奖励，后续继续帮盟友升级同盟。
  constraints:
  - 适用于 S1 赛季完整开荒流程；后续赛季参见各自专用指南。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#sheet-s1-season
  updated_at: '2026-04-16'
  confidence: 0.88
