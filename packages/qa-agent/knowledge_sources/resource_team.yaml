- id: mech-recruit-zizhong-transport
  domain: team
  entry_kind: generic_rule
  topic: 辎重运输
  aliases:
  - 辎重运送
  - 护送辎重
  facts:
  - 辎重路线设定后有 30 分钟准备时间，准备期间同盟成员可加入护送。
  - 单条辎重路线最多 20 名同盟成员护送。
  - 运输损耗随距离增大，最高 50% 封顶。
  constraints:
  - 辎重队全灭会销毁辎重，参战部队退守。
  - 神行职业专门针对辎重运输骚扰。
