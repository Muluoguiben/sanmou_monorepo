- id: kdocs-tip-diangao-daozhuan
  domain: team
  entry_kind: generic_rule
  topic: 开荒技巧 电表倒转
  aliases:
  - 电表倒转
  - 电表倒转置换
  facts:
  - 电表倒转：利用新手期置换规则，使等级更低、体力更少的一队，与体力更多、等级更高的一队置换，让角色从低体力继承为高体力。
  - 示例：20级20体力祝融直接与30级30体力张宁置换，置换后祝融会变成30级30体力。
  - 高换低需先让一队与 5 级角色置换，再与二队置换。例如祝融 37 级 20 体力先和 5 级角色置换，再和 20 级 100 体力的二队置换，祝融即可变成
    20 级 100 体力。
  constraints:
  - 必须在新手期（周一上午十点前）完成，之后无法体力置换。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#technique-2
  updated_at: '2026-04-16'
  confidence: 0.92
  related_topics:
