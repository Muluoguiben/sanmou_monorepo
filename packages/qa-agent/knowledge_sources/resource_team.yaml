- id: mech-troop-reserve
  domain: team
  entry_kind: generic_rule
  topic: 预备兵
  aliases:
  - 预备兵
  - 补兵
  - 征兵储备
  - 下阵返还
  facts:
  - 预备兵由主城征兵所产出，是部队补员储备。
  - 下阵武将返还规则分两种情况：
  - 新手期内：下阵第二队武将，兵力直接转化为预备兵补充主力。
  - 非新手期：下阵武将只返还 80% 的增兵粮食（不是兵力），不是预备兵。
  - 征兵所升级可提升预备兵上限和每小时征兵数（具体数值待补）。
  constraints:
  - 新手期（48 小时）内的下阵返兵优势不要浪费，错过后同样操作只能拿粮食。
  source_type: manual_rule
  source_ref: KB-MECH-TROOP-005
  updated_at: '2026-04-13'
  confidence: 0.9
  related_topics:
  - 征兵
  - 辎重征兵
  - 新手保护
  priority: 78
