- id: kdocs-tip-123-kaihuang
  domain: team
  entry_kind: generic_rule
  topic: 开荒技巧 123开荒
  aliases:
  - 123开荒
  - 一二三开荒
  facts:
  - 123 开荒：让当前等级最高的角色分别带二队与三队角色，开原本只有一队能打的高级地。
  - 二队、三队需提前练级；参考等级门槛 1 队 35、二队 28、三队 24。
