  - 枪克骑
  - 骑克盾
  facts:
  - 4 主战兵种：盾兵、骑兵、弓兵、枪兵。
  - 克制链：盾克弓 → 弓克枪 → 枪克骑 → 骑克盾。
  - 克制方对被克制兵种造成的伤害 +15%。
  constraints:
