  domain: team
  entry_kind: generic_rule
  topic: S12 弈定江淮赛季开荒全流程（小仔哥版）
  aliases:
  - 弈定江淮流程
  - S12开荒
  - W9开荒
  facts:
  - 准备工作 - S12 赛季九级地及以下守军未见明显区别；张宁在七、八级地依然可用，但同红度更推荐南蛮。
  - 准备工作 - 装备推荐：两智统、一武先、一先攻；开荒词条：先御=完璧、神威、打磨、守拙、镇定、破虏、灵光、夺志；打架马匹：游龙、穿云、聪慧、灵心、碎岩、锐目（S12
    推荐）。
  - 准备工作 - S12 除氪佬外均推荐选"务农"；中高红如卡四级兵营差资源，可用富国转换粮食补缺口。
  - 准备工作 - 远征时完璧优先给诸葛，同时诸葛亮金书换减伤书不需金书；孟获与诸葛亮最好双兵令、双互势。
  - 第一步至第四步 - 标准流程（抽卡→箕形阵董卓+祝融+孟获打五到 16 级→三宝开垦所有地→左田宁或貂蝉+祝融+孟获贴红度开六到 20 级）。
  - 第五步（常规）- 主力队继续上阵，开垦内城六到 21 级，挑邓艾七级地开垦（可换左田宁参考《四海归心》配置），升四级兵营过章。
  - 第五步（隐藏）- 同业铸山河无兵营开八套路；木铁石各一块囤四次八升六本。
  - 第六步 - 扫七到 28 级（满红蛮族 25）尝试外城八（张飞守军）；第十章任务以前一队不要超过 30 级。
  - 第八步 - 七本解锁雁形阵后转薪火南蛮扫九；南蛮中高红以上 30 级就可尝试一直开九，优先挑甘宁/张飞九级地。
  - 二、三队练级 - 电表倒转换成南蛮队打地；"123"顶级开荒手法（一队 35/二队 27/三队 25 时置换祝融+孟获+神诸葛，外城简单九级地一人 20 体力打一块）。
  constraints:
  - 适用于 S12 弈定江淮（W9）。新赛季高级地守军将迎来加强，确保不会翻车再使用"123"。
