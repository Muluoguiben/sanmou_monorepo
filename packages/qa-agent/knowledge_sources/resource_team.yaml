  priority: 92
- id: team-troops
  domain: team
  topic: 兵力
  aliases:
  - 兵
  - 兵员
  - 士兵数量
  facts:
  - 兵力是队伍作战能力和承伤能力的重要组成部分。
  - 兵力不足会显著影响打地稳定性和可承受战损空间。
  constraints:
  - 兵力是否充足应与目标地块强度和武将状态一起判断。
