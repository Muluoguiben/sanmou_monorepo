  - 征兵所
  facts:
  - 资源征兵消耗粮食 / 铁 / 石头 / 木头，按时间逐步产出预备兵。
  - 征兵所等级越高，每小时征兵数越多。
  - 木头、铁、石头的主要用途之一就是升级征兵所等级以提升征兵速率。
  - 每兵具体资源消耗与分档数值待补。
