- id: mech-stamina-basics
  domain: team
  entry_kind: generic_rule
  topic: 体力机制
  aliases:
  - 体力
  - 体力值
  - 体力上限
  - 体力回复
  - 体力恢复
  facts:
  - 武将基础体力上限为 200 点，无职业差异；镇军职业通过天赋可将上限提升至 240 点。
  - 体力自然回复速率为每 3 分钟恢复 1 点，回满 200 点需 10 小时。
  - 体力耗尽后武将无法攻打土地、扫荡、参与攻城战等耗体力行为；建筑、科技、行军不消耗体力。
  constraints:
  - 自然回复不受道具影响，道具只是在回复之外额外补充。
  source_type: manual_rule
  source_ref: KB-MECH-STAMINA-001
  updated_at: '2026-04-13'
  confidence: 0.95
  related_topics:
  - 体力药
  - 打地
  - 重伤
  priority: 90
  structured_data: null
