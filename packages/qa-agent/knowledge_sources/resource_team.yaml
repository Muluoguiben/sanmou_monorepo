  domain: team
  entry_kind: generic_rule
  topic: 辎重征兵
  aliases:
  - 辎重
  - 同盟征兵
  - 辎重补兵
  facts:
  - 辎重征兵需在同盟城池或营帐补给范围内进行。
  - 消耗辎重和主城预备兵，无时间消耗，不消耗额外资源。
  - 辎重 ∶ 预备兵消耗比例 = 1 ∶ 1。
  - 同盟营帐建造时间约 90 分钟。
  constraints:
  - 辎重是同盟资源，来源为工坊自产、司仓职业技能、盟内捐献。
  - 离同盟大营过远无法使用辎重征兵。
