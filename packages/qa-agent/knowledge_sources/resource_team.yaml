  entry_kind: generic_rule
  topic: S13 兴汉讨逆赛季开荒全流程（小仔哥版）
  aliases:
  - 兴汉讨逆流程
  - S13开荒
  - W10开荒
  facts:
  - 准备工作 - S13 九级地及以下守军未见明显区别；张宁在开七阶段保持微弱优势；中高红一律董蛮，低红可尝试貂蛮。
  - 准备工作 - 新赛季战法普遍不可用于开荒；若木鹿大王开荒需做好仅自带战法有收益的准备；群孙坚目测无法替代张宁，或许可替代田丰。
  - 准备工作 - S13 额外赠送大量资源，稳扎稳打有很大概率完成十五章任务；不建议越多级打地。
  - 准备工作 - 落地解锁游侦，迅速锁定家附近双张飞九级地；第一块九后可放缓后续开九。
  - 准备工作 - S13 首日额外 3 万铜币 + 一个鸡腿；一队吃完所有鸡腿前不要升 31 级。
  - 准备工作 - 下赛季保留土地开九科技（每日次数有限，务必用尽）。
  - 第一步至第四步 - 标准流程（抽卡→箕形阵董卓+祝融+孟获打五到 16 级→第三步若貂蝉更红可换貂蝉+祝融+孟获）。
  - 第五步（常规 / 隐藏）- 常规挑邓艾七级地开垦升四级兵营过章；隐藏路线 26 级无兵营开八（木铁石各一块囤四次八升六本）。
  - 第六步 - 扫七到 28 级（满红蛮族 25）尝试张飞守军外城八；不到位等五级兵营再试。
  - 第八步 - 七本解锁雁形阵后转薪火南蛮扫九，南蛮中高红 30 级即可一直开九（优先甘宁/张飞）。
  - 二、三队练级 - 通过电表倒转换成南蛮队；"123"顶级开荒手法（一队 35/二队 27/三队 25 时置换祝融+孟获+神诸葛）。
  constraints:
  - 适用于 S13 兴汉讨逆（W10）。
