- id: mech-troop-same-type-bonus
  domain: team
  entry_kind: generic_rule
  topic: 同兵种加成
  aliases:
  - 兵种加成
  - 3阵加成
  - 三盾
  - 三弓
  - 三骑
  - 三枪
  facts:
  - 3 人同兵种部队整体获得 5% 加成。
  - 弓兵 3 阵：+5% 增伤。
  - 盾兵 3 阵：-5% 受伤（减伤）。
  - 骑兵 3 阵：具体数值待补（已确认 5% 总加成，分配方向未核实）。
  - 枪兵 3 阵：具体数值待补（已确认 5% 总加成，分配方向未核实）。
  constraints:
  - 2 阵（2 人同兵种）加成数值暂无权威数据，不要凭记忆填。
  source_type: manual_rule
