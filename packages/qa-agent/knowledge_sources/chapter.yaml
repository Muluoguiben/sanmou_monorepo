- id: mech-season-types
  domain: chapter
  entry_kind: generic_rule
  topic: 赛季剧本
  aliases:
  - 赛季类型
  - 赛季剧本
  - S1
  - S2
  - 问鼎赛季
  - 隆中对
  - 赛季列表
  facts:
  - 目前游戏共有 13 个赛季剧本，每个赛季有差异化规则与内容。
  - 赛季分类包括：新手赛季（S1）、常规赛季、问鼎赛季（进阶对抗，启用国家队加成等）、年度剧本（如「九州鼎沸」）、特色赛季（如「隆中对」支持自创武将与结缘信物）。
  - 不同赛季下外城资源地上限、规则机制可能不同。
  constraints:
  - 赛季列表随版本更新，具体 13 个赛季的名称与编号需查版本内赛季面板。
  source_type: manual_rule
  source_ref: KB-MECH-SEASON-002
