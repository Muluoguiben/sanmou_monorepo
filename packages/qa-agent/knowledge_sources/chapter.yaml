  facts:
  - 保留：武将、武将进阶、战法、战法进阶、玉石、黄金、名望值、武将信物、战法信物、求贤令、名将令、同盟令、永久外观、月卡剩余天数、活动进度、结义等级、情义值。
  - 装备与坐骑仅赛季仓库内的保留，其他清除。
