- id: mech-season-timeline
  domain: chapter
  entry_kind: generic_rule
  topic: 三谋赛季时间线
  aliases:
  - 赛季时间线
  - 赛季列表
  - 所有赛季
  - 赛季剧本列表
  facts:
  - S1 — 英雄集结（2024-06 公测首赛季，玩家口语常叫"新手赛季"）。
  - S2 — 英雄觅处（2024-07-31 先锋/2024-08-03 首批，新增英雄觅处、军团推图等）。
  - S3 — 半周年庆赛季（2024 年底，加入司马懿/乐进/大乔等，引入司马体系与乐进体系）。
  - S4 — 名称待确认（社区资料缺）。
  - S5 — 问鼎赛季·应天受命（W2，首个问鼎赛季，2024-12 / 2025-01 左右开启）。
  - S6 — 问鼎赛季·群雄争锋（2025-02，新增王异/马腾/袁术 + 空城计/步步为营/妙计伏兵）。
  - S7 — 问鼎自选剧本首批（W2 应天受命 + W4 汉祚黄天 可自选）。
  - S8 — 名称待确认（2025 年中，前瞻服即将关服话题出现在 S8 末）。
  - S9 — 名称待确认（2025-07-26 开启）。
  - S10 — 名称待确认（可能涉及 W7 南郡烽起，小仔哥合集把某赛季标为 "S4赛季/W7 南郡烽起"，版本对应关系待核实）。
  - S11 — 四海归心（问鼎剧本，官方 PV BV1aEC4BTEKq）。
  - S12 — 弈定江淮（问鼎剧本，小仔哥 kdocs 合集收录）。
  - S13 — 问鼎自选：W6 业铸山河 + 兴汉讨逆（2026-02-28 开）。
  - S14 — 问鼎自选：W11 陈仓之围 + W6 业铸山河（2026-04-18 开启新批次，当前赛季）。
  - 已知 W 码映射：W2=应天受命 / W4=汉祚黄天 / W6=业铸山河 / W7=南郡烽起 / W11=陈仓之围。
  constraints:
  - 社区来源为主，S4/S8/S9/S10 的剧本名与部分 W 映射待进一步核实，confidence ≤ 0.7。
  - 同一 W 剧本可在多个 S 赛季重复开放（如业铸山河 = W6 出现在 S13 和 S14）。
  source_type: manual_rule
