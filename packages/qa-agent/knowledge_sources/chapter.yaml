- id: chapter-reward
  domain: chapter
  topic: 章节奖励
  aliases:
  - 领章节奖励
  - 领取章节奖励
  - 章节领取
  facts:
  - 当当前章节目标全部满足后，章节奖励即可领取。
  - 领取章节奖励后通常会解锁下一章目标或新的推进条件。
  constraints:
  - 未完成当前章节目标时不能领取章节奖励。
