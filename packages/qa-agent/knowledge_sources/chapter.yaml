- id: chapter-task
  domain: chapter
  topic: 章节任务
  aliases:
  - 章节
  - 章节目标
  - 主线章节
  facts:
  - 章节任务是条件驱动的推进系统，需要达成指定目标后才能领取奖励并进入下一阶段。
  - 章节奖励往往会影响前期资源、节奏和功能开放优先级。
  constraints:
  - 每章目标和奖励内容以当前章节配置为准。
  source_type: manual_rule
  source_ref: KB-RULE-CHAPTER-001
  updated_at: 2026-03-29
  confidence: 0.95
  related_topics:
