- id: mech-skill-types
  domain: skill
  topic: 战法类型
  aliases: [指挥战法, 主动战法, 被动战法, 追击战法]
  facts:
    - 指挥战法：战斗最先发动，不受控制状态影响，但武将阵亡后失效。
    - 主动战法：武将行动后、普攻前按概率发动；受「技穷」状态压制，可被打断。
    - 被动战法：满足特定条件时自动触发，提供持续 buff/debuff。
    - 追击战法：普攻后按概率发动；受「缴械」状态压制。
  source_type: manual_rule
  source_ref: KB-MECH-SKILL-003
  updated_at: 2026-04-13
  confidence: 0.9
  related_topics: [技穷, 缴械, 战法概率]
  priority: 83

- id: mech-skill-judge-order
  domain: skill
  topic: 战法判定顺序
  aliases: [战法发动顺序, 战法结算顺序, 战法释放顺序]
  facts:
    - 单回合内战法判定顺序为：被动 → 指挥 → 主动 → 普攻 → 追击。
    - 同类型战法之间按携带位排序：自带战法先判定，然后第 1 格，最后第 2 格。
    - 所以相同类型战法的携带需要考虑上下位置关系，想先触发的放上面。
  source_type: manual_rule
  source_ref: KB-MECH-SKILL-005
  updated_at: 2026-04-13
  confidence: 0.88
  related_topics: [战法类型, 战法携带]
  priority: 82

- id: mech-skill-pull-attack
  domain: skill
  topic: 借刀型战法
  aliases: [借刀战法, 拉打型战法, 拉打, 苦肉计, 指点乾坤, 舍身取义]
  facts:
    - 玩家社区习惯称为「借刀型战法」（视频攻略中也常叫「拉打型战法」，指同一类）。
    - 借刀/拉打战法（黄盖自带、苦肉计、指点乾坤等）会让携带者借队伍核心输出的手去打一套伤害。
    - 伤害结果受被借者（作用目标武将）的属性影响（智力/武力增伤、法术/物理破甲等）。
    - 同时受作用于携带者自身的同类型战法增伤影响（主动/追击/指挥/被动增伤按战法类型匹配）。
    - 携带者自身的四维属性和其他类型增伤不参与借刀伤害计算。
    - 例：黄盖苦肉计是主动战法，黄盖点鬼谋（主动增伤韬略）能增强本次借刀伤害。
  source_type: manual_rule
  source_ref: KB-MECH-SKILL-006
  updated_at: 2026-04-13
  confidence: 0.82
  related_topics: [战法判定顺序, 韬略]
  priority: 78

- id: mech-skill-attribute-scaling
  domain: skill
  topic: 战法属性加成
  aliases: [战法括号, 受属性影响, 战法面板]
  facts:
    - 大部分战法描述带括号，标明「受到叉叉属性影响」。
    - 「受到自身叉叉属性影响」表示根据携带者属性增强战法实际效果，实战数值通常高于面板显示。
    - 「受到目标叉叉属性影响」表示根据战法作用目标（非攻击目标）的属性增强效果；S1 自带战法无此类，携带战法中常见（如披坚执锐受目标智力/统帅影响）。
    - 关键区别：作用目标是获得状态的武将，攻击目标是承伤武将。
  source_type: manual_rule
  source_ref: KB-MECH-SKILL-007
  updated_at: 2026-04-13
  confidence: 0.85
  related_topics: [战法类型, 战法判定顺序]
  priority: 80

- id: mech-skill-rarity
  domain: skill
  topic: 战法稀有度
  aliases: [橙战法, 紫战法, 蓝战法, 战法抽取, 战法进阶]
  facts:
    - 战法和武将稀有度规则相同，都分蓝、紫、橙 3 档，橙色最强。
    - 寻访 20 抽触发保底机制。
    - 战法/武将进阶到 5 星累计需要 1 + 1 + 2 + 3 + 3 = 10 张同名碎片（从 1 星升到 2/3/4/5 星分别消耗 1/1/2/3/3 张）。
  constraints:
    - 橙色战法数量有限，多余重复可拆解换其他战法。
  source_type: manual_rule
  source_ref: KB-MECH-SKILL-004
  updated_at: 2026-04-13
  confidence: 0.92
