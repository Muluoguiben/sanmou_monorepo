- id: mech-skill-level-up
  domain: skill
  topic: 战法升级
  aliases: [战法等级, 10级战法, 战法升满级]
  facts:
    - 战法最高 10 级，消耗铜币升级，逐级消耗递增（具体每级铜币表待补）。
    - 战法重置可 100% 返还升级消耗的铜币。
    - 武将初始有 1 个自身战法位（Lv5 起就带）；10 级解锁第 2 个战法位（可携带）；20 级解锁第 3 个战法位（可携带）；最多 1 自带 + 2 携带。
    - 25 / 30 / 35 级各解锁 1 个韬略位，共 3 个韬略位。
  source_type: manual_rule
  source_ref: KB-MECH-SKILL-001
  updated_at: 2026-04-13
  confidence: 0.88
  related_topics: [战法重置, 战法栏位, 韬略]
  priority: 86

- id: mech-skill-reset
  domain: skill
  topic: 战法重置
  aliases: [重置战法, 战法卸下, 拆战法]
  facts:
    - 每周一 0 点刷新重置次数。
    - 每周前 10 次重置免费。
    - 第 11–20 次每次消耗 20 黄金；第 21 次起每次消耗 50 黄金。
    - 新手期内战法重置无限次免费。
    - 战法从武将身上卸下后等级不变，可直接转给其他武将。
  source_type: manual_rule
  source_ref: KB-MECH-SKILL-002
  updated_at: 2026-04-13
