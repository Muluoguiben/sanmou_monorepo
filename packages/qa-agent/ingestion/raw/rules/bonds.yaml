- id: mech-bond-faction
  domain: hero
  topic: 阵营加成
  aliases: [阵营, 同阵营加成, 同势力]
  facts:
    - 同一国家 3 人上阵时，三人全部属性额外 +10%。
    - 2 人同国 + 1 人他国时，三人全部属性额外 +5%（非 0）。
    - 国家队（刘备/曹操/孙权所在国家队伍）额外享 +5% 全属性加成，但仅问鼎赛季生效，S1–S3 不生效。
    - 阵营/国家加成与缘分加成独立，可叠加。
    - 缘分加成仅对缘分内武将生效；队伍中未进入该缘分的武将吃不到该缘分效果。
  source_type: manual_rule
  source_ref: KB-MECH-BOND-001
  updated_at: 2026-04-13
  confidence: 0.92
  related_topics: [缘分, 部队上阵, 国家队, 问鼎赛季]
  priority: 87

- id: mech-bond-system
  domain: hero
  topic: 缘分系统
  aliases: [缘分, 羁绊, 列传]
  facts:
    - 缘分需要指定武将全部上阵于同一支部队才能触发，不要求相邻位置。
    - 激活后给部队中缘分武将提供属性加成或特殊能力。
    - 缘分、阵营、兵种加成三层独立叠加。
    - 游戏内缘分不分 S/A/B 显式等级，效果差异由组合本身决定。
  source_type: manual_rule
  source_ref: KB-MECH-BOND-002
  updated_at: 2026-04-13
  confidence: 0.88
  related_topics: [阵营加成, 部队上阵]
  priority: 86

