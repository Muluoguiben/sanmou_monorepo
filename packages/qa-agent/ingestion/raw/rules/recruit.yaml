- id: mech-recruit-resource
  domain: team
  topic: 资源征兵
  aliases: [征兵, 普通征兵, 征兵所]
  facts:
    - 资源征兵消耗粮食 / 铁 / 石头 / 木头，按时间逐步产出预备兵。
    - 征兵所等级越高，每小时征兵数越多。
    - 木头、铁、石头的主要用途之一就是升级征兵所等级以提升征兵速率。
    - 每兵具体资源消耗与分档数值待补。
  source_type: manual_rule
  source_ref: KB-MECH-RECRUIT-001
  updated_at: 2026-04-14
  confidence: 0.82
  related_topics: [快速征兵, 辎重征兵, 预备兵]
  priority: 82

- id: mech-recruit-fast
  domain: team
  topic: 快速征兵
  aliases: [快速征兵, 加速征兵]
  facts:
    - 开启快速征兵可立即获得预备兵，无需等待时间。
    - 代价是相较普通征兵的粮食消耗大幅增加。
    - 注意：游戏中没有「金券/金卷立即征兵」的机制，快速征兵本质就是用粮食换时间。
  source_type: manual_rule
  source_ref: KB-MECH-RECRUIT-002
  updated_at: 2026-04-14
  confidence: 0.85
  related_topics: [资源征兵, 辎重征兵, 粮食]
  priority: 78

- id: mech-recruit-zizhong
  domain: team
  topic: 辎重征兵
  aliases: [辎重, 同盟征兵, 辎重补兵]
  facts:
    - 辎重征兵需在同盟城池或营帐补给范围内进行。
    - 消耗辎重和主城预备兵，无时间消耗，不消耗额外资源。
    - 辎重 ∶ 预备兵消耗比例 = 1 ∶ 1。
    - 同盟营帐建造时间约 90 分钟。
  constraints:
    - 辎重是同盟资源，来源为工坊自产、司仓职业技能、盟内捐献。
    - 离同盟大营过远无法使用辎重征兵。
  source_type: manual_rule
  source_ref: KB-MECH-RECRUIT-003
  updated_at: 2026-04-13
  confidence: 0.88
  related_topics: [辎重运输, 司仓, 预备兵]
  priority: 84

- id: mech-recruit-zizhong-transport
  domain: team
  topic: 辎重运输
  aliases: [辎重运送, 护送辎重]
  facts:
    - 辎重路线设定后有 30 分钟准备时间，准备期间同盟成员可加入护送。
    - 单条辎重路线最多 20 名同盟成员护送。
    - 运输损耗随距离增大，最高 50% 封顶。
  constraints:
    - 辎重队全灭会销毁辎重，参战部队退守。
    - 神行职业专门针对辎重运输骚扰。
  source_type: manual_rule
  source_ref: KB-MECH-RECRUIT-004
  updated_at: 2026-04-13
  confidence: 0.85
  related_topics: [辎重征兵, 神行]
  priority: 78
