    - "1 级地: 1,200；2 级地: 2,560；3 级地: 2,800；4 级地: 6,400；5 级地: 12,000。"
    - "6 级地: 26,000；7 级地: 44,000；8 级地: 80,000；9 级地: 140,000；10 级地: 200,000。"
