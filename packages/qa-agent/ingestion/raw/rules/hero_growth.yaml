- id: mech-hero-exp-sources
  domain: hero
  topic: 武将经验获取
  aliases: [武将升级, 经验来源, 怎么升级武将]
  facts:
    - 主要经验来源：攻打土地（占大头）、讨伐贼寇（少量）、PVP 竞技场（队中未满级武将）。
    - 储备经验来源：军演关卡挂机奖励；关卡通过越多，挂机收益越高。
    - 任何等级的武将都可以吃挂机经验升级，没有「>47 级无法挂机」的限制。
    - 储备经验使用规则：账号等级最高的 3 名武将（主力）无法使用储备经验升级。
    - 若二队主力的等级与一队主力相同，则二队主力也被视为「主力」，同样无法使用储备经验升级。
  source_type: manual_rule
  source_ref: KB-MECH-HERO-002
  updated_at: 2026-04-13
  confidence: 0.9
  related_topics: [练兵所, 军演, 打地经验衰减]
  priority: 86

- id: mech-hero-training-ground
  domain: hero
  topic: 练兵所
  aliases: [挂机练兵, 练兵场]
  facts:
    - 练兵所供满体力武将挂机积攒储备经验。
    - 账号等级最高的 3 名武将（主力）无法使用储备经验升级；非主力武将可随意使用。
    - 若二队主力与一队主力等级持平，二队主力也被视作主力锁定，无法吃储备经验。
    - 挂机经验本身对所有武将开放，不看等级高低。
  source_type: manual_rule
  source_ref: KB-MECH-HERO-003
  updated_at: 2026-04-13
  confidence: 0.88
  related_topics: [武将经验获取, 储备经验]
  priority: 82

- id: mech-hero-recruitment
  domain: hero
  topic: 武将获取途径
  aliases: [寻访, 抽卡, 招贤纳士, 定向寻访]
  facts:
    - 寻访系统分 3 种卡池：①招贤纳士（常规全武将池，消耗求贤令/黄金）；②限时卡池（达对应霸业阶段开启）；③定向寻访（仅消耗信物积分）。
    - 武将品质分蓝/紫/橙三档，阵营分魏/蜀/吴/群四方。
    - 橙卡是开荒和实战的主力武将。
    - 紫卡和蓝卡玩家都可获取，基本每个玩家都能达到全图鉴水平；它们主要用于图鉴、新手过渡和特殊缘分。
    - 目前知识库中 13 名紫卡尚未录入数据（非「未开放」，是收录缺口），优先级低，后续需补录。
  source_type: manual_rule
  source_ref: KB-MECH-HERO-004
  updated_at: 2026-04-13
