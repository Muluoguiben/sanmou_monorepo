- id: mech-hero-level-cap
  domain: hero
  topic: 武将等级上限
  aliases: [武将等级, 50级, 等级上限]
  facts:
    - 武将等级上限为 50 级。
    - 橙卡和紫卡起始等级为 5 级，从 Lv5 成长到 Lv50 共获得 45 次属性成长。
    - 满级属性 = 基础属性 + 成长值 × 45。
  source_type: manual_rule
  source_ref: KB-MECH-HERO-001
  updated_at: 2026-04-13
  confidence: 0.95
