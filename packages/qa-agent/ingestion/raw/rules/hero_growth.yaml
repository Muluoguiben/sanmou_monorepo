  aliases: [升级经验, 升级消耗, 经验表, Lv5到Lv50]
  facts:
    - 从 Lv N 升到 Lv N+1 所需经验（单位：点）：
    - "Lv5→6: 2000；Lv6→7: 3000；Lv7→8: 4000；Lv8→9: 5000；Lv9→10: 6000。"
    - "Lv10→11: 8000；Lv11→12: 11000；Lv12→13: 14000；Lv13→14: 17000；Lv14→15: 20000。"
    - "Lv15→16: 28000；Lv16→17: 32000；Lv17→18: 36000；Lv18→19: 40000；Lv19→20: 44000。"
    - "Lv20→21: 80000；Lv21→22: 96000；Lv22→23: 114000；Lv23→24: 134000；Lv24→25: 158000。"
    - "Lv25→26: 192000；Lv26→27: 220000；Lv27→28: 252000；Lv28→29: 288000；Lv29→30: 328000。"
    - "Lv30→31: 380000；Lv31→32: 428000；Lv32→33: 480000；Lv33→34: 536000；Lv34→35: 596000。"
    - "Lv35→36: 720000；Lv36→37: 840000；Lv37→38: 960000；Lv38→39: 1080000；Lv39→40: 1200000。"
    - "Lv40→41: 1500000；Lv41→42: 1800000；Lv42→43: 2100000；Lv43→44: 2400000；Lv44→45: 2700000。"
    - "Lv45→46: 3000000；Lv46→47: 3300000；Lv47→48: 3600000；Lv48→49: 4000000；Lv49→50: 4500000。"
    - 关键跳档：Lv20、Lv35、Lv40、Lv45 每档开始经验需求显著上调。
    - Lv5→Lv50 累计约需 3800 万经验。
