- id: mech-combat-injury
  domain: combat
  topic: 重伤
  aliases: [重伤状态, 休整, 重伤时间]
  facts:
    - 与玩家部队战斗后部队进入重伤状态，叠加「休整」层数。
    - 每层休整 +1 分钟重伤时间；最多叠 20 层；每 10 分钟自然减 1 层。
    - 与玩家战斗每次获得 3 层休整。
    - 新手期重伤时间显著缩短。
    - 金疮药可立即清除重伤；青囊【起死回生】可清除全队重伤。
  source_type: manual_rule
  source_ref: KB-MECH-COMBAT-001
  updated_at: 2026-04-13
  confidence: 0.88
