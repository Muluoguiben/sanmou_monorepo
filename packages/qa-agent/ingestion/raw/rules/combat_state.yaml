- id: mech-combat-siege
  domain: combat
  topic: 攻城战
  aliases: [攻城, 拆城, 打城, 城池战]
  facts:
    - 攻城分主力队（破驻城守军）和拆迁队（拆城池耐久）。
    - 必须先清空城市守军，否则上拆迁队会撞守军败退。
    - 拆迁队单次拆迁值 300。
    - 投石车是拆耐久主力。
    - 攻城集结时间固定 3 分钟。
    - 守军恢复时间 3 分钟。
  source_type: manual_rule
  source_ref: KB-MECH-COMBAT-003
  updated_at: 2026-04-13
  confidence: 0.85
