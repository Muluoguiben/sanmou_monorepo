  priority: 84

- id: mech-combat-loss-return
  domain: combat
  topic: 战损返还
  aliases: [战损, 战损换粮, 战损转化]
  facts:
    - 清剿叛军营地：兵力按 90% 返还为粮食。
    - 同盟出生州内与玩家战斗：战损 60% 以粮食返还。
    - 青囊【起死回生】期间，部队战损转化为粮食。
