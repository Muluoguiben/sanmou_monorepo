- id: mech-combat-rounds
  domain: combat
  topic: 战斗回合机制
  aliases: [8回合, 连战, 平局, 战斗胜利条件]
  facts:
    - 单场战斗固定 8 回合。
    - 8 回合内未分胜负（平局）则以当前战斗状态进入下一轮战斗。
    - 前一轮 8 回合中阵亡的武将，平局进入的第二场不加入战斗。
    - 战斗胜利后进入连战时，下一轮开始前结算上一轮损失：部分伤兵转化为死兵，其余伤兵与阵亡武将重回战斗。
    - 胜利判定：打光敌方所有兵力才算胜利，与「主将死即队伍败」的其他 SLG 不同。
  source_type: manual_rule
  source_ref: KB-MECH-COMBAT-005
  updated_at: 2026-04-13
  confidence: 0.9
  related_topics: [连战, 战损, 重伤]
  priority: 86

- id: mech-combat-turn-order
  domain: combat
  topic: 出手顺序
  aliases: [先攻, 速度, 行动顺序]
  facts:
    - 己方队伍内部严格按先攻值从高到低出手。
    - 敌我之间不纯粹按先攻值：先攻差 ≥ 70 点时高者必先出手；差 < 70 点时高者概率性先出手。
    - 先攻值相同则双方各 50% 概率先出手；差距越大高者先手概率越大。
    - 想让 A 比 B 先出手，只需进入战斗后 A 的先攻值高于 B 即可。
  source_type: manual_rule
  source_ref: KB-MECH-COMBAT-006
  updated_at: 2026-04-13
  confidence: 0.88
  related_topics: [先攻, 战法判定顺序]
  priority: 84

- id: mech-combat-damage-buff
  domain: combat
  topic: 增减伤与易伤
  aliases: [增伤, 减伤, 易伤, 伤害修正]
  facts:
    - 增伤直接提升武将伤害；减伤降低承受伤害，两者抵消。
    - 增减伤来源：武将自带战法、携带战法、装备马匹、韬略、原问、羁绊等。
    - 我方增伤总和封顶 100%，超出部分溢出浪费（含武力增伤、谋略增伤等）。
    - 施加于敌方的减伤降低效果（易伤）不受此封顶影响。
    - 易伤可把敌方减伤压到负值，相当于增加我方实际伤害（如大乔国色）。
    - 同数值下，易伤比我方增伤更强——不会被 100% 上限截断。
  source_type: manual_rule
  source_ref: KB-MECH-COMBAT-007
  updated_at: 2026-04-13
  confidence: 0.85
  related_topics: [大乔国色, 战法属性加成, 韬略]
  priority: 82

- id: mech-combat-low-troop-penalty
  domain: combat
  topic: 兵力低伤害衰减
  aliases: [残血伤害, 兵力影响伤害, 低兵伤害]
  facts:
    - 武将当前兵力低于一定阈值时，其造成的伤害会显著下降。
    - 观察案例：关平伏兵四起在 9000+ 兵力时对周瑜 ~270、孙权 ~360；兵力跌到 800 时对周瑜 ~90、孙权 ~120（降幅约 3 倍）。
    - 实战含义：核心输出需要保证足够兵力在场，过度缺兵会严重拖低输出。
  source_type: manual_rule
  source_ref: KB-MECH-COMBAT-008
  updated_at: 2026-04-13
  confidence: 0.78
  related_topics: [兵力, 补兵, 增减伤与易伤]
  priority: 75

- id: mech-combat-research-tech
  domain: combat
  topic: 研究所战斗科技
  aliases: [科技加成, 研究所, 兵种科技, 国家对抗]
  facts:
    - 研究所战斗科技分三大类：基础属性、兵种增减伤、针对四国武将的国家对抗增减伤。
    - 学习后的加成直接作用于战斗队伍（全局），无需装备。
    - 兵种科技每个兵种点满 10 级后激活一个额外效果。
    - 盾兵 10 级：第 2 回合减伤 +7%。
    - 骑兵 10 级：首回合 +5% 规避率。
    - 枪兵 10 级：第 4 回合 +8% 破甲。
    - 工兵 10 级：第 3 回合 +10% 会心/奇谋几率。
  source_type: manual_rule
  source_ref: KB-MECH-COMBAT-009
  updated_at: 2026-04-13
  confidence: 0.86
  related_topics: [兵种克制, 建筑升级, 增减伤与易伤]
  priority: 80

- id: mech-combat-aura-duration
  domain: combat
  topic: 辅助状态持续时间
  aliases: [清醒状态, 辅助时长, 状态持续]
  facts:
    - 辅助类战法给其他武将上的状态（如舍身取义给队友的清醒）持续至受状态武将下一次出手为止。
    - 不只是回合数窗口——即使跨回合，只要目标未行动，状态仍有效。
    - 目标开始行动时状态才消失。
  source_type: manual_rule
  source_ref: KB-MECH-COMBAT-010
  updated_at: 2026-04-13
  confidence: 0.82
