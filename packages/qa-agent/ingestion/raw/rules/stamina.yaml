- id: mech-stamina-wuweizi
  domain: team
  topic: 五味子
  aliases: [体力药, 青囊炼药, 体力丹, 加80体力药, +60体力药]
  facts:
    - 五味子由青囊职业【炼药】天赋产出，用于恢复武将体力，无武将等级限制。
    - 品阶越高恢复量越大：普通五味子 +60 体力，精品五味子 +80 体力。
    - 玩家俗称「+60 体力药」通常指烤鸡或普通五味子，「+80 体力药」指精品五味子。
    - 一阶青囊每天炼丹 1 次（基础 +60，有概率出精品 +80）；二阶青囊额外产出可赠送盟友的丹药礼盒。
  constraints:
    - 需要队内或盟内有青囊职业玩家持续产出，不是普适道具。
  source_type: manual_rule
  source_ref: KB-MECH-STAMINA-003
  updated_at: 2026-04-13
  confidence: 0.88
  related_topics: [青囊, 体力机制, 烤鸡]
  priority: 85

