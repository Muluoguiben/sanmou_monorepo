  topic: 烤鸡
  aliases: [鸡腿, 烤鸡道具]
  facts:
    - 烤鸡是前期主线章节奖励道具，使用后恢复 60 点体力。
    - 使用限制：武将等级 ≤ 30 级可用（30 级仍可使用），31 级起不可再使用；仅能对自己队伍使用，不能赠送盟友。
