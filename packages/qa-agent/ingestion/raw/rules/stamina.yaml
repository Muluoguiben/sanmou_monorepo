- id: mech-item-jiuzhiyao
  domain: team
  topic: 救治药
  aliases: [救治效果, 救治buff]
  facts:
    - 使用后获得 30 分钟「救治」效果。
    - 效果期间全体部队与其他玩家战斗后，重伤时间 -50%。
    - 效果期间死兵的 30% 返还为预备兵，预备兵总上限 15000。
    - 每天限用 1 次。
  constraints:
    - 该效果只对与其他玩家战斗生效（PVP 情境），打地/清剿等 PVE 不享受。
  source_type: manual_rule
