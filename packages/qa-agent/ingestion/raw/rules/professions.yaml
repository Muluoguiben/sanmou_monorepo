- id: mech-profession-qingnang
  domain: hero
  topic: 青囊
  aliases: [青囊职业, 炼药职业, 治疗职业]
  facts:
    - 青囊是治疗/炼药职业，负责补给丹药与战场治愈。
    - 一阶天赋：每日炼药（产出五味子、金疮药、行军丹、救治药等）。
    - 二阶天赋：丹药礼盒可赠送盟友；【起死回生】效果期间战损部分转化为粮食。
