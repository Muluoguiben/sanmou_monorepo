- id: mech-profession-tiangong
  domain: hero
  topic: 天工
  aliases: [天工职业, 器械建造]
  facts:
    - 天工是建造/器械职业，负责战争器械生产与攻城支援。
    - 一阶天赋：建筑升级加速相关效果。
    - 二阶天赋：战争器械生产/攻城加成。
    - 冲车、投石车、拒马、箭塔等战争器械由天工建造。
