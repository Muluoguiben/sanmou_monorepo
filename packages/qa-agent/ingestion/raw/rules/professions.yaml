- id: mech-profession-zhenjun
  domain: hero
  topic: 镇军
  aliases: [镇军职业, 加体力职业]
  facts:
    - 镇军是军事前线职业，侧重战斗持续力。
    - 一阶天赋：提升武将体力上限（可将 200 上限提升至 240）。
    - 二阶天赋：战斗持续力/重伤恢复相关加成。
