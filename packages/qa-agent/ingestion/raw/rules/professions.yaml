  priority: 85

- id: mech-profession-sicang
  domain: hero
  topic: 司仓
  aliases: [物资后勤, 司仓职业]
  facts:
    - 司仓是物资后勤职业，侧重资源产出与掠夺。
    - 一阶天赋：资源掠夺效率提升（战斗后从对方获取更多资源）。
    - 二阶天赋：特殊物资产出（支援盟内的稀缺资源）。
  source_type: manual_rule
  source_ref: KB-MECH-PROFESSION-002
  updated_at: 2026-04-14
