- id: mech-profession-overview
  domain: hero
  topic: 职业系统
  aliases: [职业, 6职业, 选职业, 一阶二阶]
  facts:
    - 游戏共 6 个职业：司仓、镇军、奇佐、天工、青囊、神行。
    - 每个职业分一阶和二阶，分别解锁不同功能性天赋。
    - 赛季重置后职业清空，需重新选择。
    - 职业选择应与队伍定位、同盟分工配合（如同盟内分工覆盖补给/治疗/建造/机动）。
  source_type: manual_rule
  source_ref: KB-MECH-PROFESSION-001
  updated_at: 2026-04-14
