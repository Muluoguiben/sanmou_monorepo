- id: term-season-code-vs-wcode
  domain: term
  entry_kind: generic_rule
  topic: S 码与 W 码的区别
  aliases:
  - S 码
  - W 码
  - 赛季编号
  - 剧本编号
  - S代码
  - W代码
  facts:
  - S 码（S1/S2/.../S14）是游戏的"赛季周期"递增编号，表示第几轮赛季（约一个半月一轮）。
  - W 码（W2/W4/W6/W7/W11 等）是"剧本"编号，一个 W 剧本可能在多个 S 赛季重复开放（典型的如"业铸山河""兴汉讨逆"）。
  - 问鼎赛季后引入"自选剧本"机制，同一 S 赛季内不同服务器可选择不同 W 剧本。
  - 服务器号里的前缀（S3-434 服、W10-0020 服）是服务器批次号/剧本服务器分组，不是赛季号本身，需看上下文区分。
  constraints:
  - 服务器号前缀与赛季/剧本编号容易混淆，需看上下文。
  source_type: manual_rule
  source_ref: community_synthesis:2026-04-16
  updated_at: '2026-04-16'
  confidence: 0.85
  related_topics:
  - 赛季
  - 剧本
  - 问鼎赛季
  priority: 78

- id: mech-season-timeline
  domain: chapter
  entry_kind: generic_rule
  topic: 三谋赛季时间线
  aliases:
  - 赛季时间线
  - 赛季列表
  - 所有赛季
  - 赛季剧本列表
  facts:
  - 'S1 — 英雄集结（2024-06-13 公测首赛季）。'
  - 'S2 — 英雄觅处（2024-07-31 先锋 / 2024-08-03 首批）。'
  - 'S3 — 半周年庆赛季（2024-Q4，加入司马懿/乐进/大乔，引入司马体系与乐进体系）。'
  - 'S4 — 九州鼎沸（2024-11-16 开启，首个年度剧本 + 首个问鼎赛季，含九州议事/政令台/藏书阁）。'
  - 'S5 — 应天受命（W2，首个带 W 码的问鼎剧本，~2025-01 开启）。'
  - 'S6 — 群雄争锋（2025-02-22，新增王异/马腾/袁术 + 空城计/步步为营/妙计伏兵）。'
  - 'S7 — 问鼎自选剧本首批（2025-04-12，W2 应天受命 + W4 汉祚黄天 可自选）。'
  - 'S8 — 隆中对（2025 年中，一周年年度剧本，以诸葛亮隆中对为背景的九大势力割据）。'
  - 'S9 — 业铸山河（W6，2025-07-26 开启，天工"速营"天赋 + 赛季两次转职 + 10-12 级土地难度提升）。'
  - 'S10 — 南郡烽起（W7，2025-09-20 开启，吴蜀争斗剧本，魏延/卞夫人 + 同盟科技树 + 霸业建筑）。'
  - 'S11 — 四海归心（2025-11-15 开启，祝融夫人实装 + 新 GVE 玩法）。'
  - 'S12 — 弈定江淮（~2026-01 开启）。'
  - 'S13 — 兴汉讨逆 + 业铸山河（自选，2026-02-28 开启，北方/西南阵营对抗 vs 南军/北军对抗）。'
  - 'S14 — 陈仓之围（W11）+ 业铸山河（W6）自选（2026-04-18 开启新批次，当前赛季）。'
  - '已知 W 码映射：W2=应天受命 / W4=汉祚黄天 / W6=业铸山河 / W7=南郡烽起 / W11=陈仓之围。'
  - '年度剧本 vs 问鼎剧本：S4 九州鼎沸、S8 隆中对 是"年度剧本"（一周年/半周年主题）；其他带 W 码的是"问鼎自选剧本"。'
  constraints:
  - 同一 W 剧本可在多个 S 赛季重复开放（如业铸山河 W6 首发 S9，后在 S13/S14 作为自选剧本复用）。
  - S2-S3 的具体剧本副标题来源为社区概括，可能与官方命名有出入。
  source_type: manual_rule
