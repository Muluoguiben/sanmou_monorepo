- id: term-hongdu
  domain: term
  entry_kind: generic_rule
  topic: 红度
  aliases:
  - 满红
  - 中红
  - 红度档位
  - 武将红度
  facts:
  - 红度是武将命星/觉醒强度标记，每抽一张同名武将可将红度 +1，最高 5 红即"满红"。
  - 档位口语对应：1-2 红为低红，3 红为中红，4 红偏高红，5 红为满红。
  - 小仔哥兵损阈值基于红度划分：满红不超过 500-1000，中低红不超过 2000。
  constraints:
  - 不同流派/玩家对中红边界叫法略有差异，3 红是主流"中红"定义。
  source_type: manual_rule
  source_ref: user_clarification:2026-04-16
  updated_at: '2026-04-16'
  confidence: 0.92
  related_topics:
  - 红度
  - 觉醒
  - 兵损
  priority: 82

- id: term-neicheng-land
  domain: term
  entry_kind: generic_rule
  topic: 内城土地
  aliases:
  - 内城地
  - 军垦地
  - 内城田
  facts:
  - 内城土地等级范围 2-12 级（外城土地仅到 8 级）。
  - 内城 8 级地难度低于外城 8 级地，"无兵营开八"的目标就是屯内城 8 级军垦。
  constraints:
  - 等级解锁取决于章节进度。
  source_type: manual_rule
  source_ref: user_clarification:2026-04-16
  updated_at: '2026-04-16'
  confidence: 0.9
