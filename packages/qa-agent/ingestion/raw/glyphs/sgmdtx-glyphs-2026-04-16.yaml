- id: sgmdtx-glyph-equipment-technique
  domain: hero
  entry_kind: generic_rule
  topic: 装备特技一览
  aliases:
  - 装备特技
  - 特技词条
  facts:
  - 无双（方天画戟专属）：吕布装备时自带战法发动率提升 15%，成功发动后失效。
  - 武圣（青龙偃月刀专属）：关羽装备时，战斗首回合自带战法发动率提升 8%，同时免疫技穷。
  - 仁德（雌雄双股剑专属）：刘备装备时，战斗开始时我军随机两人全属性提升 3%。
  - 奸雄（青釭剑专属）：曹操装备时，战斗首回合使敌军随机两人最高属性降低 8%，持续 2 回合。
  - 风华（孔雀羽扇专属）：周瑜装备时奇谋几率提升 10%。
  - 谋定：战斗第 7 回合，会心和奇谋几率提升 12%，持续至战斗结束。
  - 神威：累计造成兵刃伤害后，提高自身 1 点武力，最多叠加 10 次，持续至战斗结束。
  - 夺志：造成谋略伤害后 30% 概率降低目标 6 点统率，持续 1 回合。
  - 神射：战斗第 4 回合自身获得必中状态，持续 1 回合。
  - 藏锋：战斗第 5 回合对敌方兵力最低造成 30% 兵刃伤害。
  - 扶危：战斗第 4 回合倒戈和攻心提升 9%，持续 2 回合。
  - 先御：战斗第 2 回合自身获得 1 层抵御。
  - 护卫：战斗第 3 回合嘲讽敌军随机单体，持续 1 回合。
  - 意志：战斗第 4 回合自身获得清醒状态，持续 1 回合。
  - 无畏：战斗第 2 回合自身免疫缴械状态，持续 1 回合。
  - 集智：战斗第 3 回合自身免疫技穷状态，持续 1 回合。
  - 静心：战斗首回合自身免疫混乱状态，持续 1 回合。
  - 援救：战斗第 2 回合恢复友军随机单体兵力（治疗率 35%）。
  - 说术：战斗第 6 回合对敌军随机单体施加缴械或技穷，持续 1 回合。
  - 非攻：战斗第 2 回合使敌军随机单体会心和奇谋伤害降低 10%，持续 2 回合。
  constraints:
  - 专属特技仅绑定武将命中时生效。
  - 数值来源 sgmdtx.com/texiao。
  source_type: manual_rule
  source_ref: https://www.sgmdtx.com/texiao
  updated_at: '2026-04-16'
  confidence: 0.92
  related_topics:
  - 装备
  - 特技
  - 专属装备
  priority: 80

