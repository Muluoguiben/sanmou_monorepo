- id: term-jitui
  domain: term
  entry_kind: generic_rule
  topic: 鸡腿
  aliases:
  - 鸡腿道具
  - 体力道具
  facts:
  - 鸡腿是体力恢复道具，每个恢复 60 点体力；体力上限 200。
  - 160 无损吃鸡腿技巧：体力 160 时攻击野地瞬间虽扣 20 但经验只发一半，此时吃 60 体力鸡腿恰好回满到 200，实现升级节点附近体力经验双无损。
  constraints:
  - 无损触发局限于 31 级升级临界场景。
  source_type: manual_rule
  source_ref: user_clarification:2026-04-16
  updated_at: '2026-04-16'
  confidence: 0.9
  related_topics:
  - 体力
  - 鸡腿
  - 升级
  priority: 76

- id: term-taozei
  domain: term
  entry_kind: generic_rule
  topic: 讨贼
  aliases:
  - 讨贼活动
  - 贼寇讨伐
  facts:
  - 讨贼是同盟独立玩法，与军演、主线经验是三套独立来源。
  - 讨贼单次经验 = 贼寇等级 × 2000（8 级贼寇 = 16000 经验）。
  - 3 兵讨贼技巧：二/三队不带兵 5 级蹭盟友讨贼车队，吃讨贼 + 军演双份经验即可快速飞到 10 级。
  constraints:
  - 不带兵蹭车需先跟队长沟通且有把握打赢。
  source_type: manual_rule
  source_ref: user_clarification:2026-04-16
  updated_at: '2026-04-16'
  confidence: 0.9
  related_topics:
  - 讨贼
  - 军演
  - 3兵讨贼
  priority: 78
