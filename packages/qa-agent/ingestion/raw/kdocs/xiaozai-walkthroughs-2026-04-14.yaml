- id: kdocs-wangye-logic
  domain: combat
  entry_kind: generic_rule
  topic: 王业之争战场逻辑（小仔哥 16 条 + 黑科技）
  aliases:
  - 王业之争逻辑
  - 王业战场逻辑
  - 王业指南
  facts:
  - 逻辑一 - 王业的本质是比较人数的多少。
  - 逻辑二 - 王业地图天然分割成上下路两个战场。
  - 逻辑三 - 最好进场前将成员划分两拨，上下战场各安排一名指挥；指挥可释放军策给全同盟增益。
  - 逻辑四 - 局部战场人数是动态的，高机动性可形成短暂多打少。
  - 逻辑五 - 指挥有条件最好使用场外语音调动。
  - 逻辑六 - 胜利标准看积分数量；前半场积分来源主要是占领与开垦，占领农庄可同时完成两项。
  - 南郑解锁以前 - 逻辑七：前期开放地图两侧两个农庄，需至少占领其中一个并让所有人迅速开垦该农庄 80 次。
  - 南郑解锁以前 - 逻辑八：开垦农庄不需要主力，二三队开垦，一队保护与干扰。
  - 南郑解锁以前 - 逻辑九：农庄开垦 80 次后可舍弃，中间两农庄开放时所有人用一队占领，二三队留作机动。
  - 二三队可参与事项 - 农庄占领后迅速开垦、占领城寨（占领积分）、铺路南郑（天工提前起建筑）、打架游走（限高战）、偷家干扰。
  - 逻辑十 - 铺路任务非常关键；天工在对方必经之地铺路起箭塔爽收过路费；奇佐在前线起玄术营帐可快速传送；偷偷铺路到对方老家可悄悄飞人。
  - 逻辑十一 - 城池解锁以后尽可能快往前线迁城，缩短调动时间。
  - 逻辑十二 - 铺路南郑以后第一时间起行驿建筑，可最多调动 40 队。
  - 南郑解锁以后 - 逻辑十三：占领方从南郑派 4 辆粮车走向自家精锐大营，积分分别 3000/3500/4000/4500/5000。
  - 逻辑十四 - 粮车派出后南郑依然可争夺，易主不影响行驶但可阻止后续派出。
  - 逻辑十五 - 粮车与南郑形成两大战场；若对方粮车难以阻止可掉头抢下南郑并在运送路径起防御建筑。
  - 逻辑十六 - 一般抢粮车比抢南郑简单很多；弱势方抢下南郑后续也不一定守得住粮车，抢南郑或许非最优解。
  - 黑科技 - 放对方第一辆粮车走，在对方分身乏术阶段铺路起建筑将南郑包围，再夺回南郑，我方后续运送成功率大大提升。
  constraints:
  - 适用于王业之争 PvP 战场玩法。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#sheet-wangye
