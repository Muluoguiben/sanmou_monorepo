  - 卢植
  priority: 78

- id: kdocs-walkthrough-s2-s3
  domain: team
  entry_kind: generic_rule
  topic: S2/S3 赛季开荒全流程（小仔哥版）
  aliases:
  - S2开荒流程
  - S3开荒流程
  - S2S3开荒指南
  facts:
  - 准备工作 - 赛季商店买好铜币/预备兵/紫装紫马/书简；日常商店用粮食买 4 次铜币，金币买 2 次铜币。
  - 准备工作 - 开局落其他洲可以白嫖一次跨州再起（开关前会整顿）。
  - 准备工作 - 装备属性推荐：一智统/一智先/一统先/一武先；开荒词条：先御、决机、意志、守拙、镇定、破虏（远征不生效）、灵光、夺志；马匹：万象、君临、照影、神速。
  - 准备工作 - 开荒前三推荐职业：司仓、青囊、天工；冲榜拿金币：镇军、奇佐；资源州毛地最快：神行。
  - 准备工作 - S3 赛季仅比 S2 多出政令台系统，其余无变化，政令台全部选资源类增益。
  - 准备工作 - S2/S3 新手期只能练两队（实测过多次）；新手期后二队最优解：刘法马。
  - 第一步 - 抽卡 15 分钟内，三个杂牌武将打完家里二、三级地到 10 级，内城四级地耗尽体力后下阵（任务卡第七章打八块四差两块）。
  - 第二步（不二带一）- 上阵满体力桃园（一字阵，或 张梁+张宝+张角），打 5 块三 1 块四到 10 级，继续 1 块四过八块四任务，置换成 袁绍+蔡文姬+董卓 打沙摩柯的五级地到 18 级（15 级穿装备）。
  - 第二步（二带一）- 二带一结束用菜园董（袁绍+蔡文姬+董卓），扫五到 17 级（优先打沙摩柯）。
  - 第三步 - 确保菜园董细节无误，挑内城刘烨六级地开六。
  - 第四步 - 每块六级地各打一块用于屯田过六本；升建筑过第十章任务（繁荣度不够用三队打外城地）；剩余资源全部升兵营。S2 第一天爆缺兵，不建议无兵营开七。
  - 第五步 - 主力战法重置下阵，换三个满体力（1T+2C）打三级到 11 级，置换成 徐盛+张郃+徐晃 或 大乔+太史慈+孙策 将所有地开垦到至少五级后下阵。
  - 第六步 - 有兵营后换回菜园董扫六；20 级置换成苦肉弓，内城打完就打外城；打到 24 级（满红 22）尝试开内城七，失败继续打六，25 级解锁兵书后开七。
  - 第七步 - 扫七到 29 级（满红 27），苦肉弓技能更换后尝试开外城八；若远不够等 30 级解锁第二本金书后再试。
  - 第八步 - 第一天首要目标是快速过第十章任务，切记先升资源建筑及征兵所、最后升民居磨坊；司仓八级前尽量不打石头地，军垦开采两次八级石头；一队 30 级后体力尽可能用在将内城七开垦到八。
  - 第九步 - 二队如无蹭经验就在练兵所挂机到下午 2:50 升到 10 级，再换菜园董开垦内城五级地；16 级后扫六练级；满红第一天可考虑用二队开垦内城七级地。
  constraints:
  - 适用于 S2/S3 赛季。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#sheet-s2-s3
  updated_at: '2026-04-16'
  confidence: 0.88
