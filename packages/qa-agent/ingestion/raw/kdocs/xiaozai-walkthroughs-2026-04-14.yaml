- id: kdocs-wangye-professions
  domain: team
  entry_kind: generic_rule
  topic: 王业之争 6 大职业作用
  aliases:
  - 王业职业
  - 王业职业作用
  facts:
  - 司仓 - 给同盟提供辎重，提升采集速度与盟友征兵速度。
  - 神行 - 快速突进、挖掘暗道、隐身、建造神机营、绕后偷袭。
  - 镇军 - 提升城外征兵速度、愈战愈勇、编队后移速提升。
  - 青囊 - 金疮药、战败返兵、医庐、倾注、降低盟友重伤时间。
  - 天工 - 建造箭塔等防守建筑、投石等拆迁建筑，战斗冲车、开局打造装备。
  - 奇佐 - 陷阱、求援、放火、传送至营帐、使野地禁止造建筑。
  constraints:
  - 作用描述基于王业之争战场玩法。
