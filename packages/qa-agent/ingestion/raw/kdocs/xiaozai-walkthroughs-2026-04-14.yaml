- id: kdocs-walkthrough-s10-nanjun
  domain: team
  entry_kind: generic_rule
  topic: S10 南郡烽起赛季开荒全流程（小仔哥版）
  aliases:
  - 南郡烽起流程
  - S10开荒
  - W7开荒
  facts:
  - 准备工作 - S10 赛季九级地及以下守军未见明显区别，整体框架保持不变。
  - 准备工作 - 开荒装备属性推荐：两智统、一武智、一先攻；马匹：万象、君临、照影、疾驰、神速。
  - 准备工作 - S10 军略台前两天卡片所有人都一样，放心使用完再刷新（木铁石粮各 3 万）；第三天先升级军略台再使用卡片。
  - 准备工作 - 践墨随敌左田宁打张飞孙坚效果不错，但打甘宁依旧带金城汤池；机变无穷没给张宁质变，主要抬周瑜。
  - 准备工作 - 讨贼可让二队带 3 兵蹭经验跳过等待期直接打五。
  - 第一步 - 抽卡 15 分钟内，三个武将打二、三级地到 10 级，内城四级地耗尽体力后重置下阵。
  - 第二步（不二带一）- 上阵满体力桃园（或三宝），打 5 块三 1 块四到 10 级；置换成 左慈+蔡文姬+张郃 挑皇甫嵩五级地打到 13 级；13 级起置换菜园董扫五到 18 级。
  - 第二步（二带一）- 直接用菜园董扫五到 17 级（优先刘烨的五级地）。
  - 第三步 - 挑内城刘烨六级地开六，打到 20 级置换成左田宁。
  - 第四步 - 换三个满体力（1T+2C）打八块三到 10，置换成菜园董将所有地开垦到至少五级后下阵。
  - 第五步（常规）- 20 级左田宁扫六到 22 级，挑程普或邓艾七级地开垦（石头三次、木铁各一次）升六本过第九章。
  - 第五步（隐藏）- 20 级左田宁扫六到 22，挑程普或邓艾七级地开垦，囤一次七后内城全部七，再打外城七到 27 级（留 60 点体力），27 级无兵营开八。
  - 第六步 - 4 级兵营后用左田张疯狂开七，打到 28 级（满红 27）尝试外城八（简单：张飞、程普；困难：荀彧、黄忠）。
  - 第七步 - 第一天优先快速过第十章，先升资源建筑及征兵所，最后升民居磨坊；司仓八级前不打石头地。
  - 第八步 - 第一天睡前若开荒顺利，先升到七本不要提前点科技，晚上把资源建筑全部拉到十一级左右。
  - 第九步 - 二队新手期练级标准流程，详见业铸山河同步流程。
  constraints:
  - 适用于 S10 南郡烽起（W7）。
  source_type: manual_rule
