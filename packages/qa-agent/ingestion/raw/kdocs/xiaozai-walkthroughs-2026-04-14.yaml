- id: kdocs-wangye-troop-traits
  domain: combat
  entry_kind: generic_rule
  topic: 王业之争兵种特性与强化
  aliases:
  - 王业兵种特性
  - 王业特性指南
  facts:
  - 神射 - 至少 2 名弓兵武将时，全体造成主动战法伤害后对敌军随机单体造成 35% 传递伤害。
  - 游骑 - 至少 2 名骑兵武将时，未发动追击战法有 40% 概率重判并对敌 1-2 人施加断粮 1 回合，每回合最多触发 1 次。
  - 坚盾 - 至少 2 名盾兵武将时，每造成 3000 点治疗量令智力最高单体对敌全体造成 100% 谋略伤害。
  - 枪锋 - 至少 2 名枪兵武将时，全体普攻 65% 概率伤害提升 15% 并为随机友方施加一层抵御，每回合最多触发 3 次。
  - 兵种特性强化备注 - 一般最多覆盖两支队伍，强度方差太大，神射/枪锋是核心增强，游骑/坚盾仅锦上添花；选择兵种特性意味着最多只玩两队主力，三队打杂。
  - 强策 - 主动战法伤害提升 20%（最通用，覆盖三支队伍）。
  - 睿谋 - 智力提升 5%，谋略伤害提升 12%。
  - 灵巧 - 规避率提升 10%，每次触发规避后本回合夺取伤害来源 4% 伤害增加，可叠加 3 次。
  - 锋意 - 会心提升 8%，会心伤害提升 15%。
  - 连势 - 追击战法发动率提升 6%。
  - 养锋 - 受恢复效果提升 25%，第 4 回合起造成伤害提升 5%。
  - 刚勇 - 武力提升 5%，兵刃伤害提升 12%。
  - 奇策 - 奇谋提升 8%，奇谋伤害提升 15%。
  - 刃甲 - 反击率提升 20%，回合结束 35% 概率令武力最高单体对随机敌军反击一次。
  - 绛影 - 女性武将战斗时全属性提升 20 点，受伤降低 5%（最强特性；白板玩家收益拉满，四大阵营强化只需搭配蜀薪火/吴火烧/魏王异/群南蛮各一只，有绛影必出王异以及南蛮）。
  - 魏武/群雄/吴焰/蜀志 - 对应阵营武将阶数提升 2（至多 5 阶，战场内生效），全属性提升 10 点。
  - 同契 - 激活缘分的部队战斗时全属性增加 20 点（遇到必选）。
  constraints:
  - 兵种特性强化为王业之争玩法内的强化，仅战场内生效。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#sheet-wangye-traits
  updated_at: '2026-04-16'
  confidence: 0.9
