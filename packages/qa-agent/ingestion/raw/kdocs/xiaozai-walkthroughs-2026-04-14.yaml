- id: kdocs-walkthrough-s11
  domain: team
  entry_kind: generic_rule
  topic: S11 四海归心赛季开荒全流程（小仔哥版）
  aliases:
  - 四海归心流程
  - S11开荒
  - W8开荒
  facts:
  - 准备工作 - S11 第一天都选武官；开局会多一个鸡腿；推荐中红以上左田宁尝试无兵营开八囤八。
  - 准备工作 - 装备推荐：三智统、一武先；词条：先御、神威、打磨、守拙、镇定、破虏、灵光、夺志；马匹：万象、君临、照影、疾驰、神速。
  - 第一步至第四步 - 标准流程（抽卡→菜园董/三宝扫五扫六到 20 级→置换左田宁）。
  - 第五步（常规）- 20 级左田宁或蛮族队扫六到 21 级，挑程普/邓艾七级地开垦，升六本过第九章。
  - 第五步（隐藏）- 20 级左田宁或蛮族队扫六到 21，囤一次七后内城全部七，打外城七到 26 级（留 60 体力），26 级无兵营开八。
  - 第六步 - 4 级兵营后用左田张或蛮族队开七，打到 28 级（满红蛮族 25）尝试外城八。
  - 第八步 - 七本解锁雁形阵后转薪火南蛮扫九，优先解锁祝融金书挑战远征。
  - 第十步（冲总榜前十）- 一队 36/二队 27/三队 24 级时用"一带二"手法毛九级地：姜维+刘备+诸葛亮（36/28/24 级）。
  constraints:
  - 适用于 S11 四海归心（W8）。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#sheet-s11
