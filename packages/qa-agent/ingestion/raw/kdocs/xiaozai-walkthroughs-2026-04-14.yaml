- id: kdocs-walkthrough-s4-yezhushanhe
  domain: team
  entry_kind: generic_rule
  topic: S4 业铸山河赛季开荒全流程（小仔哥版）
  aliases:
  - 业铸山河流程
  - S4业铸山河开荒
  - S4W6开荒
  facts:
  - 准备工作 - 本赛季拥有两次转职机会（第一次在第九天开放）；前期全部选开荒职业。
  - 准备工作 - 上线第一件事打军演；点亮有资源收益的天赋后再进行其他操作。
  - 准备工作 - 业铸山河落地会额外赠送一个鸡腿，尽快过第十章避免溢出；一队吃完所有鸡腿以前不要升 31 级。
  - 准备工作 - 第三天中午以后再讨贼。
  - 准备工作 - 推荐中红以上左田宁尝试无兵营开八、内城屯田囤八。
  - 准备工作 - 只要有一个武将到 35 级，就可以通过置换把所有武将金书洗出来（最好洗在第一本，25 级起就可以一直用金书）。
  - 准备工作 - 远征时诸葛亮金书换成任意减伤书，不需金书；刘备与诸葛亮最好双兵令、双互势。
  - 第一步 - 抽卡（控制 15 分钟），找三个后续开荒不用的武将，开二、三级地到 10 级（剩 120 体力），内城四级地耗尽体力后重置下阵。
  - 第二步（不二带一）- 上阵满体力 袁绍+蔡文姬+董卓（箕形阵，或 三宝/大太孙/桃园/左菜张），带 指点/金城/披坚+折冲+胜敌，打五到 17/18 级（15 级穿装备）。
  - 第三步 - 下阵菜园董，换三个满体力武将（1T+2C）打八块三到 10，置换成三宝将家中所有地开垦到至少五级。
  - 第四步 - 上回菜园董，优先挑内城刘烨的六级地开六，打到 20 级，置换成左田宁。
  - 第五步（常规）- 将内城所有地开垦到六级，军演打到极限，挑内城程普或邓艾的七级地开垦，屯田（石头三次、木铁各一次）升六本过第九章。
  - 第五步（隐藏）- 开七后囤一次七过任务，不断打七升到 26 级，27 级无兵营开八，木铁石各一块囤四次八升六本（比常规路线前期多至少 4 万资源）。
  - 第六步 - 有 4 级兵营后用左田宁反复开七，到 28 级尝试开外城八（简单：张飞；困难：荀彧、黄忠等）。
  - 第七步 - 第一天的首要目标是快速过第十章，先升冶铁厂/石工所/伐木场及征兵所，最后升民居磨坊；司仓八级前尽量不打石头地。
  - 第八步 - 第十章完成后利用鸡腿迅速调整资源配比，七本解锁雁形阵后转薪火扫九；后续优先解锁姜维金书挑战远征。
  - 第九步 - 二队新手期练级：三个满 5 级角色不带兵混讨伐八级贼寇吃经验到 12 级，置换菜园董开垦内城五级地，吃军演经验到 16/17 级，穿装备开垦六级地。
  - 第十步（冲总榜前十）- 第二天二队挂到约 26 级，置换左田宁开垦内城八，再用三队开垦外城七补领地；一队 36/二队 27/三队 24 级时用"123"开荒：姜维+刘备+诸葛亮，疯狂毛九级地。
  constraints:
  - 适用于 S4 业铸山河（W6）。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#sheet-s4-yezhushanhe
  updated_at: '2026-04-16'
