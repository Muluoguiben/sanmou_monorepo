- id: kdocs-tip-erdaiyi
  domain: team
  entry_kind: generic_rule
  topic: 开荒技巧 二带一
  aliases:
  - 二带一
  - 二带一开荒
  facts:
  - "二带一：先练一队高等级角色，其中两人带上一个 5 级的被带武将，以 12/12/5（或 10/10/5）等级组合直接打五级地。"
  - "数字含义：两个 12（或 10）级是高等级带队武将，5 级是被带（拉经验）的准主力武将；打 2 次五级地后，5 级武将就能到 10 级。"
  - 主力队首块地直接开五级地，比正常节奏节省 30 体力 + 吃更多经验。
  constraints:
  - 适用于开荒前期，新手期体力置换规则下。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#technique-1
  updated_at: '2026-04-16'
  confidence: 0.9
  related_topics:
  - 开荒
  - 体力
  priority: 78
- id: kdocs-tip-diangao-daozhuan
  domain: team
  entry_kind: generic_rule
  topic: 开荒技巧 电表倒转
  aliases:
  - 电表倒转
  - 电表倒转置换
  facts:
  - "电表倒转：利用新手期置换规则，使等级更低、体力更少的一队，与体力更多、等级更高的一队置换，让角色从低体力继承为高体力。"
  - 示例：20级20体力祝融直接与30级30体力张宁置换，置换后祝融会变成30级30体力。
  - 高换低需先让一队与 5 级角色置换，再与二队置换。例如祝融 37 级 20 体力先和 5 级角色置换，再和 20 级 100 体力的二队置换，祝融即可变成 20 级 100 体力。
  constraints:
  - 必须在新手期（周一上午十点前）完成，之后无法体力置换。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#technique-2
  updated_at: '2026-04-16'
  confidence: 0.92
  related_topics:
  - 体力置换
  - 新手期
  priority: 82
- id: kdocs-tip-123-kaihuang
  domain: team
  entry_kind: generic_rule
  topic: 开荒技巧 123开荒
  aliases:
  - 123开荒
  - 一二三开荒
  facts:
  - "123 开荒：让当前等级最高的角色分别带二队与三队角色，开原本只有一队能打的高级地。"
  - 二队、三队需提前练级；参考等级门槛 1 队 35、二队 28、三队 24。
  constraints:
  - 需提前分配练级资源给二、三队。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#technique-3
  updated_at: '2026-04-16'
  confidence: 0.9
  related_topics:
  - 开荒
  - 多队协作
  priority: 76
- id: kdocs-tip-3bing-taozei
  domain: team
  entry_kind: generic_rule
  topic: 开荒技巧 3兵讨贼
  aliases:
  - 3兵讨贼
  - 三兵讨贼
  facts:
  - "3 兵讨贼：让二队/三队不带兵 5 级蹭盟友讨贼车队，利用讨贼经验 + 军演经验，使二队、三队飞升十级，然后直接打五级地。"
  - 需在保证可以赢的前提下执行，并与队长提前沟通。
  constraints:
  - 需与讨贼主力达成沟通。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#technique-4
  updated_at: '2026-04-16'
  confidence: 0.88
  related_topics:
  - 讨贼
  - 军演
  priority: 72
- id: kdocs-tip-wubingying-kai8
  domain: team
  entry_kind: generic_rule
  topic: 开荒技巧 无兵营开八
  aliases:
  - 无兵营开八
  - 无兵营开八级地
  facts:
  - "无兵营开八：刻意将任务卡在第七章不屯田或只屯田一次，让一队使用『左田宁』或『貂蛮』，在无兵营前提下直接开内城 8 级地。"
  - "队伍名解析：左田宁 = 左慈 + 田丰 + 张宁；貂蛮 = 貂蝉 + 祝融 + 孟获。"
  - 目标是屯 8 级军垦（内城土地最高 12 级，8 级是军垦上限前的最稳收益地）。
  - 红度够或运气好任一条件满足即可成功；内城最多多屯 5 次 8 级地，首日多约 5 万资源。
  constraints:
  - 仅限内城 8 级地，需严格卡第七章任务节奏。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#technique-5
  updated_at: '2026-04-16'
  confidence: 0.88
  related_topics:
  - 内城
  - 第七章
  - 资源
  priority: 78
- id: kdocs-tip-kong-bingsun
  domain: team
  entry_kind: generic_rule
  topic: 开荒技巧 控兵损
  aliases:
  - 控兵损
  - 兵损控制
  facts:
  - "控兵损：打任何等级的土地都需时刻关注自己的兵损。"
  - 兵损建议阈值：满红不超过 500-1000；中低红不超过 2000。
  - 后期兵损比远比越级给的经验重要。
  constraints:
  - 适用于全赛季开荒及打地，非仅新手期。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#technique-6
  updated_at: '2026-04-16'
