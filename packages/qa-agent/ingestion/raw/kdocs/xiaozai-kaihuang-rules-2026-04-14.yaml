- id: kdocs-profession-recommend
  domain: team
  entry_kind: generic_rule
  topic: 开荒前三推荐职业与冲榜职业
  aliases:
  - 开荒职业推荐
  - 冲榜职业推荐
  facts:
  - 开荒前三推荐职业：司仓、神行、青囊。
  - 最适合冲榜拿金币的职业：镇军、奇佐。
  - 转职节点非常靠后；青囊的救治现在无法在打地时生效，但可把青囊送的救治药卖掉换 2000 功勋。
  - 司仓天赋落地先点"扩容"+"缴纳"+"保境"，开完军垦后重置再点满其他。
  constraints:
  - 青囊救治打地无效为当前版本结论，后续版本可能变化。
  source_type: manual_rule
  source_ref: KDOCS:xiaozai-kaihuang-2026-04-14#detail-8-14
  updated_at: '2026-04-16'
  confidence: 0.88
  related_topics:
