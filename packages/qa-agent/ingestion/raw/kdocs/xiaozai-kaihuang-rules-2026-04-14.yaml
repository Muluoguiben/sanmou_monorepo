- id: kdocs-expedition-tech-chapter12
  domain: resource
  entry_kind: generic_rule
  topic: 远征十二章资源建筑节奏
  aliases:
  - 远征12章科技
  - 远征建筑投入
  facts:
  - 远征 12 章，最多可以提前点 3 级资源地科技；十一章时可点 2 级，具体看开荒情况。
  - 15-20 兵营共需 513w 资源；四项资源建筑 1-10 级共需 105w（已扣除奖励资源）。
  constraints:
  - 数字是"小仔哥 S14 合集"估算，随版本会有微调。
