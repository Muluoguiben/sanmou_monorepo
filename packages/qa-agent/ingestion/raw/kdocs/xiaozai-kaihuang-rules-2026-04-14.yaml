- id: kdocs-stamina-exp-jitui-trick
  domain: team
  entry_kind: generic_rule
  topic: 160体力无损吃鸡腿技巧
  aliases:
  - 鸡腿无损吃
  - 体力经验半卡
  facts:
  - 攻击野地一瞬间，体力会正常消耗 20 点，但经验只增加一半；可用此方法在 160 点体力即将升 31 级时无损吃一个鸡腿。
  constraints:
  - 仅适用于 31 级升级节点附近，体力为 160 的临界场景。
