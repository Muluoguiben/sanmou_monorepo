# Regression questions for qa-agent chat layer.
# must_cite: at least one of these entry_ids should appear in evidence or answer
# must_not_fabricate: if true, evidence should be empty AND answer should say 未收录
# contains_any: answer should contain at least one of these substrings

- id: q01-hero-basic
  question: "诸葛亮是什么阵营？满级智力多少？"
  must_cite: ["hero-zhugeliang"]
  contains_any: ["蜀"]

- id: q02-hero-alias
  question: "卧龙的代表战法是什么？"
  must_cite: ["hero-zhugeliang"]
  contains_any: ["诸葛亮", "草船借箭"]

